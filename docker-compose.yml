services:
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafa-report
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS:
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://0.0.0.0:9092,
        CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS:
        PLAINTEXT://kafka:29092,
        PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: report-kafka-ui
    ports:
      - "8980:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: report
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:16-alpine
    container_name: report-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: report
      POSTGRES_USER: report
      POSTGRES_PASSWORD: report
    volumes:
      - report-postgres-data:/var/lib/postgresql/data

volumes:
  report-postgres-data: